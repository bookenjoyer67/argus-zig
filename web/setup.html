<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus Setup</title>
<style>
  /* === Argus, the Emerald Star — fallen-titan theme === */
  :root {
    --bg:#04060d; --surface:rgba(12,19,32,.9); --text:#dfeae4;
    --accent:#1eff9d; --gold:#e8c24a;
  }
  * { box-sizing:border-box; }
  body { margin:0; color:var(--text); font-family:system-ui,sans-serif;
         display:flex; min-height:100vh; align-items:center; justify-content:center; padding:16px;
         background:
           radial-gradient(1px 1px at 18% 28%, rgba(255,255,255,.55), transparent),
           radial-gradient(1px 1px at 72% 62%, rgba(255,255,255,.4), transparent),
           radial-gradient(1px 1px at 42% 82%, rgba(120,255,200,.45), transparent),
           radial-gradient(1px 1px at 86% 18%, rgba(255,255,255,.35), transparent),
           radial-gradient(1000px 620px at 50% -12%, rgba(30,255,157,.12), transparent 70%),
           var(--bg);
         background-attachment:fixed; }
  .card { background:var(--surface); border-radius:12px; padding:24px;
          width:100%; max-width:380px;
          border:1px solid rgba(232,194,74,.25);
          box-shadow:inset 0 0 0 1px rgba(30,255,157,.06), 0 8px 40px rgba(0,0,0,.6); }
  h1 { margin:0 0 4px; letter-spacing:5px; color:#eafff5;
       text-shadow:0 0 8px rgba(30,255,157,.7), 0 0 22px rgba(30,255,157,.35);
       animation:starpulse 4s ease-in-out infinite; }
  @keyframes starpulse { 50% { text-shadow:0 0 12px rgba(30,255,157,.95), 0 0 30px rgba(30,255,157,.5); } }
  p.sub { margin:0 0 20px; color:rgba(30,255,157,.7); font-size:14px; letter-spacing:1px; }
  label { display:block; margin:14px 0 4px; font-size:13px; opacity:.8; }
  input, select { width:100%; padding:10px; border-radius:8px; border:1px solid #1d2a3a;
          background:rgba(6,10,18,.8); color:var(--text); font-size:15px; transition:all .12s; }
  input:focus, select:focus { outline:none; border-color:var(--accent);
          box-shadow:0 0 10px rgba(30,255,157,.35); }
  button { width:100%; margin-top:22px; padding:12px; border:0; border-radius:8px;
           background:var(--accent); color:#04140d; font-size:16px; font-weight:700;
           cursor:pointer; letter-spacing:1px; box-shadow:0 0 16px rgba(30,255,157,.4); }
  button:disabled { opacity:.5; box-shadow:none; }
  #wifi { display:none; }
  #msg { margin-top:14px; text-align:center; min-height:18px; font-size:14px; }
</style>
</head>
<body>
<div class="card">
  <h1>ARGUS</h1>
  <p class="sub">Device setup</p>
  <form id="f">
    <label for="name">Device name</label>
    <input id="name" name="name" placeholder="Kitchen" maxlength="32" required>

    <label for="role">Role</label>
    <select id="role" name="role">
      <option value="mobile">Mobile (pocket scanner)</option>
      <option value="base">Base station (web dashboard)</option>
    </select>

    <div id="wifi">
      <label for="ssid">Home WiFi name</label>
      <input id="ssid" name="ssid" placeholder="MyNetwork" maxlength="32">
      <label for="pass">Home WiFi password</label>
      <input id="pass" name="pass" type="password" maxlength="64">
      <label for="lat">Map latitude (optional)</label>
      <input id="lat" name="lat" type="number" step="any" min="-90" max="90" placeholder="38.627">
      <label for="lon">Map longitude (optional)</label>
      <input id="lon" name="lon" type="number" step="any" min="-180" max="180" placeholder="-90.199">
    </div>

    <button id="save" type="submit">Save &amp; Reboot</button>
    <div id="msg"></div>
  </form>
</div>
<script>
  const role = document.getElementById('role');
  const wifi = document.getElementById('wifi');
  role.addEventListener('change', () => {
    wifi.style.display = role.value === 'base' ? 'block' : 'none';
  });

  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save');
    const msg = document.getElementById('msg');
    btn.disabled = true;
    msg.textContent = 'Saving...';
    const data = new URLSearchParams(new FormData(e.target));
    try {
      await fetch('/api/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: data.toString()
      });
      msg.textContent = 'Saved. Device is rebooting.';
    } catch (err) {
      msg.textContent = 'Saved. Device is rebooting.';
    }
  });
</script>
</body>
</html>
