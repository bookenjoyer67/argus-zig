name: Deploy static content to Pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Fetch latest firmware binary for the web flasher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/firmware
          gh release download --pattern 'argus-merged.bin' --dir web/firmware --clobber \
            || echo "no release asset yet — flasher will 404 until a release exists"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
