name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Fetch firmware binaries + bump manifests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/firmware/heltec-v3 web/firmware/tdeck
          # Per-board merged images for the web flasher (USB).
          gh release download --pattern 'argus-heltec-v3-merged.bin' --dir web/firmware/heltec-v3 --clobber || true
          gh release download --pattern 'argus-tdeck-merged.bin' --dir web/firmware/tdeck --clobber || true
          # App-only image for OTA (Heltec for now).
          gh release download --pattern 'argus-zig.bin' --dir web/firmware --clobber || true
          TAG=$(gh release view --json tagName --jq .tagName 2>/dev/null || echo "")
          VER=${TAG#v}
          if [ -n "$VER" ]; then
            # The published manifests reference these bins by name; if the latest
            # release doesn't carry them the flasher 404s. Fail loudly instead of
            # silently deploying a manifest that points at a missing binary.
            missing=0
            [ -f web/firmware/heltec-v3/argus-heltec-v3-merged.bin ] || { echo "::error::release $TAG is missing argus-heltec-v3-merged.bin"; missing=1; }
            [ -f web/firmware/tdeck/argus-tdeck-merged.bin ] || { echo "::error::release $TAG is missing argus-tdeck-merged.bin"; missing=1; }
            [ "$missing" -eq 0 ] || { echo "::error::cut a release carrying the per-board merged bins (tools/release.sh)"; exit 1; }
            echo "{\"version\":\"$VER\",\"url\":\"https://bookenjoyer67.github.io/argus-zig/web/firmware/argus-zig.bin\"}" > web/firmware/version.json
            for m in web/firmware/heltec-v3/manifest.json web/firmware/tdeck/manifest.json; do
              jq --arg v "$VER" '.version=$v' "$m" > /tmp/m.json && mv /tmp/m.json "$m"
            done
          else
            echo "no release yet — flasher/OTA will 404 until one exists"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
