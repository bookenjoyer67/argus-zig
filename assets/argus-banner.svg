<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="ARGUS — Surveillance Tracker Scanner">
  <defs>
    <radialGradient id="void" cx="50%" cy="18%" r="85%">
      <stop offset="0%" stop-color="#0a1422"/>
      <stop offset="55%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#04060d"/>
    </radialGradient>
    <radialGradient id="emberGlow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#1eff9d" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#1eff9d" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1eff9d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8c24a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e8c24a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e8c24a" stop-opacity="0"/>
    </linearGradient>
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- void + emerald star glow -->
  <rect width="1200" height="320" fill="url(#void)"/>
  <rect width="1200" height="320" fill="url(#emberGlow)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="60" r="1.5" opacity="0.7"/>
    <circle cx="240" cy="120" r="1" opacity="0.5"/>
    <circle cx="360" cy="40" r="1.2" opacity="0.6"/>
    <circle cx="520" cy="90" r="1" opacity="0.45"/>
    <circle cx="690" cy="50" r="1.3" opacity="0.6"/>
    <circle cx="840" cy="110" r="1" opacity="0.5"/>
    <circle cx="980" cy="55" r="1.4" opacity="0.65"/>
    <circle cx="1090" cy="130" r="1" opacity="0.45"/>
    <circle cx="80" cy="220" r="1" opacity="0.4"/>
    <circle cx="300" cy="270" r="1.2" opacity="0.5"/>
    <circle cx="470" cy="250" r="1" opacity="0.4"/>
    <circle cx="760" cy="265" r="1.1" opacity="0.5"/>
    <circle cx="930" cy="240" r="1" opacity="0.4"/>
    <circle cx="1130" cy="255" r="1.3" opacity="0.55"/>
  </g>
  <g fill="#1eff9d">
    <circle cx="180" cy="160" r="1.4" opacity="0.6"/>
    <circle cx="640" cy="280" r="1.4" opacity="0.55"/>
    <circle cx="1010" cy="180" r="1.4" opacity="0.6"/>
    <circle cx="420" cy="160" r="1.2" opacity="0.5"/>
  </g>

  <!-- ARGUS wordmark: blurred emerald aura behind, crisp light on top -->
  <g font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif" font-weight="700" text-anchor="middle">
    <text x="600" y="170" font-size="128" letter-spacing="22" fill="#1eff9d" filter="url(#starGlow)" opacity="0.85">ARGUS</text>
    <text x="600" y="170" font-size="128" letter-spacing="22" fill="#eafff5">ARGUS</text>
  </g>

  <!-- gold accent rule -->
  <rect x="300" y="208" width="600" height="2" fill="url(#goldline)"/>

  <!-- taglines -->
  <text x="600" y="245" text-anchor="middle" font-family="'Trebuchet MS','Segoe UI',Verdana,sans-serif"
        font-size="22" letter-spacing="8" fill="#1eff9d" opacity="0.85">SURVEILLANCE TRACKER SCANNER</text>
</svg>
